name: Coverage Frontend
on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'frontend/**'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Frontend Tests
        working-directory: ./frontend
        run: |
          npm install --legacy-peer-deps
          npm install @vitest/coverage-v8
          npx vitest run --coverage
        env:
          CI: true

      - name: Generate Frontend Badges
        uses: jpb06/coverage-badges-action@latest
        with:
          coverage-summary-path: ./frontend/coverage/coverage-summary.json
          badges-icon: vitest
          output-folder: ./badges/frontend

      - name: Upload Frontend Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-frontend
          path: frontend/coverage/coverage-summary.json
