name: Coverage Frontend
on:
  push:
    branches: [ main ]
    paths: [ 'frontend/**' ]
  pull_request:
    branches: [ main ]
    paths: [ 'frontend/**' ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: coverage-front-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Frontend Tests
        working-directory: ./frontend
        run: |
          npm install --legacy-peer-deps
          # Using -D ensures it's available to the local vitest instance
          npm install -D @vitest/coverage-v8
          npm exec vitest -- run --coverage --coverage.reporter=json-summary --coverage.reporter=text
        env:
          CI: true

      - name: Generate and Push Frontend Badges
        run: |
          # Generate badges
          npx coverage-badges --coverage-summary ./frontend/coverage/coverage-summary.json --output ./.github/badges/frontend --commit-message "docs: update frontend coverage badges [skip ci]"
          
          # Configure git
          git config user.name "gazawayj"
          git config user.email "gazawayj@users.noreply.github.com"
          
          # Ensure branch is up to date
          git checkout main
          git pull --rebase origin main
          
          # Add badges
          git add ./.github/badges/frontend
          # Commit if changes exist
          git diff --cached --quiet || git commit -m "docs: update frontend coverage badges [skip ci]"
          
          # Push changes
          git push origin main