name: Coverage Frontend
on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'frontend/**'

permissions:
  contents: write

# This "lock" ensures only one workflow pushes to the repo at a time
concurrency: 
  group: git-push-lock
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch all history so the push has a better chance of succeeding
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Frontend Tests
        working-directory: ./frontend
        run: |
          npm install --legacy-peer-deps
          npm install @vitest/coverage-v8
          npx vitest run --coverage --coverage.reporter=json-summary --coverage.reporter=text
        env:
          CI: true

      - name: Generate Frontend Badges
        uses: jpb06/coverage-badges-action@latest
        with:
          # Points to where Vitest created the file
          coverage-summary-path: ./frontend/coverage/coverage-summary.json
          badges-icon: vitest
          # Output directly to this folder
          output-folder: ./badges/frontend
          # [skip ci] prevents an infinite loop of actions
          commit-message: "docs: update frontend coverage badges [skip ci]"

      - name: Upload Frontend Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-frontend
          path: frontend/coverage/coverage-summary.json
