name: Coverage Frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"

permissions:
  contents: write

concurrency:
  group: coverage-front-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache node_modules
        uses: actions/cache@v4
        id: node-cache
        with:
          path: frontend/node_modules
          key: frontend-node-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install dependencies (cache miss)
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: npm install --legacy-peer-deps

      - name: Run Frontend Tests With Coverage
        run: npx vitest run --coverage --coverage.reporter=json-summary --coverage.reporter=text
        env:
          CI: true

      - name: Generate Frontend Badges
        uses: jpb06/coverage-badges-action@latest
        with:
          coverage-summary-path: ./frontend/coverage/coverage-summary.json
          badges-icon: vitest
          output-folder: ./.github/badges/frontend
          commit-message: "docs: update frontend coverage badges [skip ci]"