name: Test Back

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "public/tiles/**/*.png"
      - "frontend/tiles/**/*.png"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "public/tiles/**/*.png"
      - "frontend/tiles/**/*.png"
  workflow_dispatch:

concurrency:
  group: test-back-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache node_modules
        uses: actions/cache@v4
        id: node-cache
        with:
          path: backend/node_modules
          key: backend-node-${{ runner.os }}-${{ hashFiles('backend/package-lock.json') }}

      - name: Install backend dependencies (cache miss)
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: npm install --legacy-peer-deps

      - name: Run Backend Tests
        run: npx vitest run --passWithNoTests