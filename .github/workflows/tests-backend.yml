name: Test Backend

on: 
  push:
    branches: ["main"]
    paths-ignore:
      - 'public/tiles/**/*.png'
      - 'frontend/tiles/**/*.png'
  pull_request:
    branches: ["main"]
    paths-ignore:
      - 'public/tiles/**/*.png'
      - 'frontend/tiles/**/*.png'

jobs:
  test-backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm install --legacy-peer-deps

      - name: Build Backend (if present)
        run: npm run build --if-present

      - name: Run Backend Tests
        # Use npm test or directly run Vitest/Jest depending on your backend test runner
        run: npm test
