name: Lint Front

on:
  push:
    branches: ["main"]
    paths-ignore:
      - 'README.md'
      - '**/README.md'
      - '**/tiles/**/*.png'
  pull_request:
    branches: ["main"]
    paths-ignore:
      - 'README.md'
      - '**/README.md'
      - '**/tiles/**/*.png'

jobs:
  eslint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install ESLint and Angular ESLint plugins
        run: |
          npm install --save-dev \
            eslint@9.15.0 @eslint/js@9.9.0 \
            @typescript-eslint/parser@6.2.0 @typescript-eslint/eslint-plugin@6.2.0 \
            @angular-eslint/eslint-plugin@16.2.0 \
            @angular-eslint/eslint-plugin-template@16.2.0 \
            @angular-eslint/template-parser@16.2.0

      - name: Run lint
        run: npx eslint . --ext .ts,.tsx,.js,.jsx
