name: Lint Front

on:
  push:
    branches: ["main"]
    paths-ignore:
      - 'README.md'
      - '**/README.md'
      - '**/tiles/**/*.png'
  pull_request:
    branches: ["main"]
    paths-ignore:
      - 'README.md'
      - '**/README.md'
      - '**/tiles/**/*.png'

jobs:
  eslint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install ESLint and Angular ESLint plugins
        run: |
          npm install --save-dev \
            eslint@10 @eslint/js \
            @angular-eslint/eslint-plugin \
            @angular-eslint/eslint-plugin-template \
            @angular-eslint/template-parser \
            --legacy-peer-deps

      - name: Run lint
        # Use npx to ensure ESLint binary is found
        run: npx eslint . --ext .ts,.tsx,.js,.jsx
