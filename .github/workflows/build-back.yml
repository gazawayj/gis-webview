name: Build Back

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "public/tiles/**/*.png"
      - "frontend/**"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "public/tiles/**/*.png"
      - "frontend/**"
  workflow_dispatch:

concurrency:
  group: build-back-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache node_modules
        uses: actions/cache@v4
        id: node-cache
        with:
          path: backend/node_modules
          key: backend-node-${{ runner.os }}-${{ hashFiles('backend/package-lock.json') }}

      - name: Install Dependencies (cache miss)
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: npm install --legacy-peer-deps

      - name: Package Backend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: ./backend