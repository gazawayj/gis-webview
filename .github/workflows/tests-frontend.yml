name: Test Frontend

on: 
  push:
    branches: ["main"]
    paths-ignore:
      - 'public/tiles/**/*.png'
      - 'backend/tiles/**/*.png'
  pull_request:
    branches: ["main"]
    paths-ignore:
      - 'public/tiles/**/*.png'
      - 'backend/tiles/**/*.png'

jobs:
  test-frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm install --legacy-peer-deps

      - name: Run frontend unit tests
        # Skip backend SSR test files
        run: npx vitest run --passWithNoTests --include 'src/**/*.spec.ts' --exclude 'src/app/app.spec.ts'
