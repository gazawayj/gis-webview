name: Lint Back

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "README.md"
      - "**/README.md"
      - "**/tiles/**/*.png"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "README.md"
      - "**/README.md"
      - "**/tiles/**/*.png"
  workflow_dispatch:

concurrency:
  group: lint-back-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flake8:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics