name: Coverage Backend
on:
  push:
    branches: [ main ]
    paths: [ 'backend/**' ]
  pull_request:
    branches: [ main ]
    paths: [ 'backend/**' ]

permissions:
  contents: write

concurrency: 
  group: git-push-lock
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ./backend/package-lock.json

      - name: Backend Tests
        working-directory: ./backend
        run: |
          npm install --legacy-peer-deps
          npm install @vitest/coverage-v8
          npx vitest run --coverage --coverage.reporter=json-summary --coverage.reporter=text
        env:
          CI: true

      - name: Generate Backend Badges
        uses: jpb06/coverage-badges-action@latest
        with:
          coverage-summary-path: ./backend/coverage/coverage-summary.json
          badges-icon: vitest
          # Moved inside the .github folder to hide from root
          output-folder: ./.github/badges/backend
          commit-message: "docs: update backend coverage badges [skip ci]"
