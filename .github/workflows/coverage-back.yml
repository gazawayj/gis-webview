name: Coverage Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: coverage-back-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache node_modules
        uses: actions/cache@v4
        id: node-cache
        with:
          path: backend/node_modules
          key: backend-node-${{ runner.os }}-${{ hashFiles('backend/package-lock.json') }}

      - name: Install Dependencies (cache miss)
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: |
          npm install --legacy-peer-deps
          npm install @vitest/coverage-v8 --no-save

      - name: Run Backend Tests With Coverage
        run: npx vitest run --coverage --coverage.reporter=json-summary --coverage.reporter=text
        env:
          CI: true

      - name: Generate Backend Badges
        uses: jpb06/coverage-badges-action@latest
        with:
          coverage-summary-path: ./backend/coverage/coverage-summary.json
          badges-icon: vitest
          output-folder: ./.github/badges/backend
          commit-message: "docs: update backend coverage badges [skip ci]"