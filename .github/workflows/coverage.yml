name: Test Coverage Badge
on:
  push:
    branches: [ main ]

jobs:
  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Essential for the action to push badge files
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install Dependencies
        run: npm ci
        working-directory: ./backend

      - name: Run Tests & Coverage
        # Ensures the json-summary report needed for badges is generated
        run: npm test -- --coverage --coverageReporters=json-summary
        working-directory: ./backend

      - name: Generate Coverage Badge
        uses: jpb06/coverage-badges-action@latest
        with:
          coverage-summary-path: ./backend/coverage/coverage-summary.json
          branches: main
          target-branch: main # Commits the badges directly to your main branch
