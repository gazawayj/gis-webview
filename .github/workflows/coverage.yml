name: Test Coverage Badge
on:
  push:
    branches: [ main ] # Only generate badges on the main branch

jobs:
  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install Dependencies
        run: npm ci
        working-directory: ./backend

      - name: Run Tests & Coverage
        # Added the specific reporter flag here
        run: npm test -- --coverage --coverage.reporter=json-summary
        working-directory: ./backend

      - name: Generate Coverage Badge
        uses: jpb06/coverage-badges-action@latest
        with:
          # Point this to the backend subfolder
          coverage-summary-path: ./backend/coverage/coverage-summary.json
          branches: main
