<svg
  width="32"
  height="32"
  viewBox="0 0 100 100"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <!-- Magnifying Glass Circle -->
  <circle cx="60" cy="40" r="20"
    stroke="currentColor"
    stroke-width="4"
    fill="none"
  />

  <!-- Handle -->
  <line x1="75" y1="55" x2="90" y2="70"
    stroke="currentColor"
    stroke-width="4"
    stroke-linecap="round"
  />

  <!-- Feature Polygon inside Magnifier -->
  <polygon points="52,35 62,25 72,35 62,45"
    stroke="currentColor"
    stroke-width="4"
    fill="none"
    stroke-linejoin="round"
  />

  <!-- Polygon vertices -->
  <circle cx="52" cy="35" r="3" fill="currentColor" stroke="white" stroke-width="2"/>
  <circle cx="62" cy="25" r="3" fill="currentColor" stroke="white" stroke-width="2"/>
  <circle cx="72" cy="35" r="3" fill="currentColor" stroke="white" stroke-width="2"/>
  <circle cx="62" cy="45" r="3" fill="currentColor" stroke="white" stroke-width="2"/>

  <!-- Magnifier center dot -->
  <circle cx="62" cy="35" r="3" fill="currentColor"/>
</svg>