<div class="page">
  <aside class="sidebar">
    <h1>GIS Web Viewer</h1>

    <!-- Planet buttons -->
    <div class="planet-buttons">
      <button (click)="setPlanet('earth')" [class.active]="currentPlanet==='earth'">Earth</button>
      <button (click)="setPlanet('moon')" [class.active]="currentPlanet==='moon'">Moon</button>
      <button (click)="setPlanet('mars')" [class.active]="currentPlanet==='mars'">Mars</button>
    </div>

    <!-- Add Layer button -->
    <div class="add-layer">
      <button (click)="onAddLayer()">Add Layer</button>
    </div>

    <!-- Layer list -->
    <div class="layer-list"
         cdkDropList
         [cdkDropListData]="sidebarLayers"
         (cdkDropListDropped)="onLayerDropped($event)">
      <ng-container *ngFor="let layer of sidebarLayers; let i = index; trackBy: trackLayer">
        <div class="layer-item-wrapper"
             cdkDrag
             (cdkDragMoved)="onLayerDragMoved()">
          <app-layer-item [layer]="layer"
            (visibilityChange)="toggleLayer(layer)"
            (colorChange)="onColorPicked(layer, $event)"
            (shapeChange)="selectShape(layer, $event)"
            (remove)="removeLayer(layer)">
          </app-layer-item>
        </div>
      </ng-container>

      <div *ngIf="sidebarLayers.length === 0" class="no-layers-tooltip">
        No layers added.
      </div>
    </div>

    <!-- Stats -->
    <div class="map-stats">
      <div class="stat-item">
        <span class="stat-label">{{ latLabel }}:</span>
        <span class="stat-value">{{ formattedLat }}</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">{{ lonLabel }}:</span>
        <span class="stat-value">{{ formattedLon }}</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Zoom:</span>
        <span class="stat-value">{{ zoomDisplay }}</span>
      </div>
    </div>

    <!-- Toolbox -->
    <div class="toolbar-wrapper">
      <div class="toolbar-label">Toolbox</div>
      <div class="toolbar-buttons">
        <img src="assets/icons/distance-tool.svg"
             alt="Distance Tool"
             class="tool-icon"
             title="Distance Tool"
             (click)="activateTool('distance')" />
      </div>
    </div>
  </aside>

  <!-- Map -->
  <div #mapContainer class="map-container"></div>

  <!-- Add Layer Modal -->
  <ng-template #addLayerModal>
    <div class="layer-modal">
      <!-- Header -->
      <div class="layer-modal-header">
        <span class="layer-modal-title">{{ modalTitle }}</span>
        <button class="close-btn" (click)="cancelAddLayer()">×</button>
      </div>

      <!-- Tabs -->
      <div class="modal-tab-buttons">
        <button [class.active]="modalMode==='manual'" (click)="switchModalMode('manual')">Manual</button>
        <button [class.active]="modalMode==='console'" (click)="switchModalMode('console')">Console</button>
      </div>

      <!-- Body -->
      <div class="layer-modal-body">
        <!-- Manual Inputs -->
        <div *ngIf="modalMode==='manual'" class="manual-inputs">
          <label>
            Name:
            <input type="text" [(ngModel)]="newLayerName" placeholder="Layer name" />
          </label>
          <label>
            Description:
            <input type="text" [(ngModel)]="newLayerDescription" placeholder="Optional description" />
          </label>
          <label>
            File:
            <input type="file" (change)="handleFileInput($event)" />
          </label>
          <label>
            Latitude Field:
            <input type="text" [(ngModel)]="latField" placeholder="latitude" />
          </label>
          <label>
            Longitude Field:
            <input type="text" [(ngModel)]="lonField" placeholder="longitude" />
          </label>
        </div>

        <!-- Console Input -->
        <div *ngIf="modalMode==='console'" class="console">
          <div class="console-input" contenteditable="true" [(ngModel)]="consoleInput" spellcheck="false"></div>
        </div>
      </div>

      <!-- Modal Actions -->
      <div class="modal-actions">
        <button (click)="confirmAddLayer()" [disabled]="
          (modalMode==='manual' && (!newLayerName || !fileContent)) ||
          (modalMode==='console' && !consoleInput)
        ">Add</button>
        <button (click)="cancelAddLayer()">Cancel</button>
      </div>
    </div>
  </ng-template>

  <!-- Distance Save Modal -->
  <ng-template #distanceSaveModal>
    <div class="distance-save-modal">
      <h3>Save Distance Layer</h3>
      <input type="text" placeholder="Layer name" [(ngModel)]="distanceLayerName" />
      <div class="buttons">
        <button (click)="confirmSaveDistance(distanceLayerName)">Save</button>
        <button (click)="closeDistanceSaveModal()">Cancel</button>
      </div>
    </div>
  </ng-template>
</div>
