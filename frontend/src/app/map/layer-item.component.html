<div class="layer-item" 
     cdkDrag 
     [cdkDragData]="layer" 
     (contextmenu)="onRightClick($event)">

  <!-- Drag handle covers the whole left section -->
  <div class="layer-item-left" cdkDragHandle>
    <span class="layer-name">{{ layer.name }}</span>
  </div>

  <!-- Controls: not draggable -->
  <div class="layer-controls">
    <!-- Color picker -->
    <input type="color" 
           [value]="layer.color" 
           (input)="onColorPicked($event)" 
           (mousedown)="$event.stopPropagation()" />

    <!-- Shape dropdown -->
    <button class="shape-selected-button" 
            (click)="openShapeDropdown()" 
            (mousedown)="$event.stopPropagation()">
      <svg width="20" height="20">
        <ng-container *ngIf="layer.shape">
          <circle *ngIf="layer.shape.toLowerCase() === 'circle'" cx="10" cy="10" r="6" [attr.fill]="layer.color" stroke="black" />
          <rect *ngIf="layer.shape.toLowerCase() === 'square'" x="4" y="4" width="12" height="12" [attr.fill]="layer.color" stroke="black" />
          <polygon *ngIf="layer.shape.toLowerCase() === 'triangle'" [attr.points]="getPoints('triangle')" [attr.fill]="layer.color" stroke="black" />
          <polygon *ngIf="layer.shape.toLowerCase() === 'diamond'" [attr.points]="getPoints('diamond')" [attr.fill]="layer.color" stroke="black" />
          <polygon *ngIf="layer.shape.toLowerCase() === 'pentagon'" [attr.points]="getPoints('pentagon')" [attr.fill]="layer.color" stroke="black" />
          <polygon *ngIf="layer.shape.toLowerCase() === 'hexagon'" [attr.points]="getPoints('hexagon')" [attr.fill]="layer.color" stroke="black" />
          <polygon *ngIf="layer.shape.toLowerCase() === 'star'" [attr.points]="getPoints('star')" [attr.fill]="layer.color" stroke="black" />
          <polygon *ngIf="layer.shape.toLowerCase() === 'arrow'" [attr.points]="getPoints('arrow')" [attr.fill]="layer.color" stroke="black" />
          <line *ngIf="layer.shape.toLowerCase() === 'line'" x1="0" y1="10" x2="20" y2="10" [attr.stroke]="layer.color" stroke-width="3" />
        </ng-container>
      </svg>
    </button>
  </div>

  <!-- Shape dropdown overlay -->
  <ng-template #shapeDropdown>
    <div class="shape-dropdown">
      <button *ngFor="let shape of dropdownShapes" (click)="selectShape(shape); $event.stopPropagation()">
        <svg width="20" height="20">
          <circle *ngIf="shape.toLowerCase() === 'circle'" cx="10" cy="10" r="6" [attr.fill]="layer.color" stroke="black" />
          <rect *ngIf="shape.toLowerCase() === 'square'" x="4" y="4" width="12" height="12" [attr.fill]="layer.color" stroke="black" />
          <polygon *ngIf="shape.toLowerCase() === 'triangle'" [attr.points]="getPoints('triangle')" [attr.fill]="layer.color" stroke="black" />
          <polygon *ngIf="shape.toLowerCase() === 'diamond'" [attr.points]="getPoints('diamond')" [attr.fill]="layer.color" stroke="black" />
          <polygon *ngIf="shape.toLowerCase() === 'pentagon'" [attr.points]="getPoints('pentagon')" [attr.fill]="layer.color" stroke="black" />
          <polygon *ngIf="shape.toLowerCase() === 'hexagon'" [attr.points]="getPoints('hexagon')" [attr.fill]="layer.color" stroke="black" />
          <polygon *ngIf="shape.toLowerCase() === 'star'" [attr.points]="getPoints('star')" [attr.fill]="layer.color" stroke="black" />
          <polygon *ngIf="shape.toLowerCase() === 'arrow'" [attr.points]="getPoints('arrow')" [attr.fill]="layer.color" stroke="black" />
          <line *ngIf="shape.toLowerCase() === 'line'" x1="0" y1="10" x2="20" y2="10" [attr.stroke]="layer.color" stroke-width="3" />
        </svg>
      </button>
    </div>
  </ng-template>

</div>
