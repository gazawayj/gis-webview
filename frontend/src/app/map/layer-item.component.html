<div class="layer-item">
  <!-- Left side: checkbox + name -->
  <div class="layer-item-left">
    <input type="checkbox" [checked]="layer.visible" (click)="toggleVisibility($event)" />
    <span class="layer-name">{{ layer.name }}</span>
  </div>

  <!-- Right side: color, shape, remove -->
  <div class="layer-controls">
    <input type="color" [value]="layer.color" (input)="onColorPicked($event)" />

    <!-- Selected shape button -->
    <button class="shape-selected-button" (click)="openShapeDropdown()">
      <svg width="20" height="20">
        <ng-container *ngTemplateOutlet="shapeSvg; context: { shape: layer.shape, color: layer.color }"></ng-container>
      </svg>
    </button>

    <button class="remove-btn" (click)="remove.emit()">✕</button>
  </div>

  <!-- Reusable SVG template for shapes -->
  <ng-template #shapeSvg let-shape="shape" let-color="color">
    <svg *ngIf="shape" width="20" height="20">
      <circle *ngIf="shape.toLowerCase() === 'circle'" cx="10" cy="10" r="6" [attr.fill]="color" stroke="black"/>
      <rect *ngIf="shape.toLowerCase() === 'square'" x="4" y="4" width="12" height="12" [attr.fill]="color" stroke="black"/>
      <polygon *ngIf="shape.toLowerCase() === 'triangle'" [attr.points]="getPoints('triangle')" [attr.fill]="color" stroke="black"/>
      <polygon *ngIf="shape.toLowerCase() === 'diamond'" [attr.points]="getPoints('diamond')" [attr.fill]="color" stroke="black"/>
      <polygon *ngIf="shape.toLowerCase() === 'pentagon'" [attr.points]="getPoints('pentagon')" [attr.fill]="color" stroke="black"/>
      <polygon *ngIf="shape.toLowerCase() === 'hexagon'" [attr.points]="getPoints('hexagon')" [attr.fill]="color" stroke="black"/>
      <polygon *ngIf="shape.toLowerCase() === 'star'" [attr.points]="getPoints('star')" [attr.fill]="color" stroke="black"/>
      <polygon *ngIf="shape.toLowerCase() === 'arrow'" [attr.points]="getPoints('arrow')" [attr.fill]="color" stroke="black"/>
      <line *ngIf="shape.toLowerCase() === 'line'" x1="0" y1="10" x2="20" y2="10" [attr.stroke]="color" stroke-width="3"/>
    </svg>
  </ng-template>

  <!-- Shape dropdown overlay -->
  <ng-template #shapeDropdown>
    <div class="shape-dropdown">
      <button *ngFor="let shape of dropdownShapes" (click)="selectShape(shape)">
        <svg width="20" height="20">
          <ng-container *ngTemplateOutlet="shapeSvg; context: { shape: shape, color: layer.color }"></ng-container>
        </svg>
      </button>
    </div>
  </ng-template>
</div>
