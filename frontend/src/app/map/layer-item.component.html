<div class="layer-item" cdkDrag [cdkDragData]="layer" (contextmenu)="onRightClick($event)">

  <div class="drag-handle" title="Drag to reorder, right click for menu">☰</div>

  <div class="layer-item-left" cdkDragHandle>
    <span class="layer-name" title="Drag to reorder, right click for menu">{{ layer.name }}</span>
  </div>

  <!-- Controls: not draggable -->
  <div class="layer-controls">
    <!-- Color picker -->
    <input type="color" [value]="layer.color" (input)="onColorPicked($event)" (mousedown)="$event.stopPropagation()" />

    <!-- Shape dropdown button -->
    <button class="shape-selected-button" (click)="openShapeDropdown()" (mousedown)="$event.stopPropagation()">
      <svg width="20" height="20" viewBox="0 0 20 20">
        @if(layer.shape === 'circle') {
        <circle cx="10" cy="10" r="7" [attr.fill]="layer.color" stroke="black" />
        }
        @if(layer.shape === 'square') {
        <rect x="4" y="4" width="12" height="12" [attr.fill]="layer.color" stroke="black" />
        }
        @if(layer.shape === 'triangle') {
        <polygon [attr.points]="getPoints('triangle')" [attr.fill]="layer.color" stroke="black" />
        }
        @if(layer.shape === 'diamond') {
        <polygon [attr.points]="getPoints('diamond')" [attr.fill]="layer.color" stroke="black" />
        }
        @if(layer.shape === 'pentagon') {
        <polygon [attr.points]="getPoints('pentagon')" [attr.fill]="layer.color" stroke="black" />
        }
        @if(layer.shape === 'hexagon') {
        <polygon [attr.points]="getPoints('hexagon')" [attr.fill]="layer.color" stroke="black" />
        }
        @if(layer.shape === 'star') {
        <polygon [attr.points]="getPoints('star')" [attr.fill]="layer.color" stroke="black" />
        }
        @if(layer.shape === 'arrow') {
        <polygon [attr.points]="getPoints('arrow')" [attr.fill]="layer.color" stroke="black" />
        }
      </svg>
    </button>
  </div>

  <!-- Shape dropdown overlay -->
  <ng-template #shapeDropdown>
    <div class="shape-dropdown">
      @for(shape of dropdownShapes; track shape) {
      <button (click)="selectShape(shape); $event.stopPropagation()">
        <svg width="20" height="20" viewBox="0 0 20 20">
          @if(shape.toLowerCase() === 'circle') {
          <circle cx="10" cy="10" r="7" [attr.fill]="layer.color" stroke="black" />
          }
          @if(shape.toLowerCase() === 'square') {
          <rect x="4" y="4" width="12" height="12" [attr.fill]="layer.color" stroke="black" />
          }
          @if(shape.toLowerCase() === 'triangle') {
          <polygon [attr.points]="getPoints('triangle')" [attr.fill]="layer.color" stroke="black" />
          }
          @if(shape.toLowerCase() === 'diamond') {
          <polygon [attr.points]="getPoints('diamond')" [attr.fill]="layer.color" stroke="black" />
          }
          @if(shape.toLowerCase() === 'pentagon') {
          <polygon [attr.points]="getPoints('pentagon')" [attr.fill]="layer.color" stroke="black" />
          }
          @if(shape.toLowerCase() === 'hexagon') {
          <polygon [attr.points]="getPoints('hexagon')" [attr.fill]="layer.color" stroke="black" />
          }
          @if(shape.toLowerCase() === 'star') {
          <polygon [attr.points]="getPoints('star')" [attr.fill]="layer.color" stroke="black" />
          }
          @if(shape.toLowerCase() === 'arrow') {
          <polygon [attr.points]="getPoints('arrow')" [attr.fill]="layer.color" stroke="black" />
          }
        </svg>
      </button>
      }
    </div>
  </ng-template>

</div>
