<div class="layer-item">
  <!-- Left side: checkbox + name -->
  <div class="layer-item-left">
    <input type="checkbox" [checked]="layer.visible" (click)="toggleVisibility($event)" />
    <span class="layer-name">{{ layer.name }}</span>
  </div>

  <!-- Right side: color, shape, remove -->

  <div class="layer-controls">
    <input type="color" [value]="layer.color" (input)="onColorPicked($event)" />

```
<!-- Selected shape button -->
<button class="shape-selected-button" (click)="openShapeDropdown()">
  <svg width="20" height="20">
    <ng-container *ngTemplateOutlet="shapeSvg; context: { shape: layer.shape, color: layer.color }"></ng-container>
  </svg>
</button>

<button class="remove-btn" (click)="remove.emit()">✕</button>

  </div>

  <!-- Reusable SVG template for shapes -->

<ng-template #shapeSvg let-shape="shape" let-color="color">
@if (shape) { <svg width="20" height="20">
@if (shape.toLowerCase() === 'circle') {
<circle cx="10" cy="10" r="6" [attr.fill]="color" stroke="black"/>
}
@if (shape.toLowerCase() === 'square') {
<rect x="4" y="4" width="12" height="12" [attr.fill]="color" stroke="black"/>
}
@if (shape.toLowerCase() === 'triangle') {
<polygon [attr.points]="getPoints('triangle')" [attr.fill]="color" stroke="black"/>
}
@if (shape.toLowerCase() === 'diamond') {
<polygon [attr.points]="getPoints('diamond')" [attr.fill]="color" stroke="black"/>
}
@if (shape.toLowerCase() === 'pentagon') {
<polygon [attr.points]="getPoints('pentagon')" [attr.fill]="color" stroke="black"/>
}
@if (shape.toLowerCase() === 'hexagon') {
<polygon [attr.points]="getPoints('hexagon')" [attr.fill]="color" stroke="black"/>
}
@if (shape.toLowerCase() === 'star') {
<polygon [attr.points]="getPoints('star')" [attr.fill]="color" stroke="black"/>
}
@if (shape.toLowerCase() === 'arrow') {
<polygon [attr.points]="getPoints('arrow')" [attr.fill]="color" stroke="black"/>
}
@if (shape.toLowerCase() === 'line') {
<line x1="0" y1="10" x2="20" y2="10" [attr.stroke]="color" stroke-width="3"/>
} </svg>
} </ng-template>

  <!-- Shape dropdown overlay -->

<ng-template #shapeDropdown> <div class="shape-dropdown">
@for (shape of dropdownShapes; track shape) {
<button (click)="selectShape(shape)"> <svg width="20" height="20">
<ng-container *ngTemplateOutlet="shapeSvg; context: { shape: shape, color: layer.color }"></ng-container> </svg> </button>
} </div> </ng-template>

</div>
